<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG OS — 100 Cards in 3 Seconds</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: #111118;
      border-bottom: 1px solid #1e1e2e;
      height: 56px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      color: #f59e0b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .logo span { color: #94a3b8; font-weight: 400; }

    header h1 {
      font-size: 15px;
      font-weight: 500;
      color: #cbd5e1;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      padding: 8px 16px;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      background: #16161f;
      color: #94a3b8;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: #1e1e2e; color: #e2e8f0; border-color: #3d3d5c; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #f59e0b;
      border-color: #fbbf24;
      color: #1a1a0a;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 24px;
    }
    .btn-primary:hover { background: #d97706; }
    .btn-primary:disabled { background: #78350f; border-color: #92400e; color: #78350f; }

    .btn-download {
      background: #065f46;
      border-color: #10b981;
      color: #6ee7b7;
      font-weight: 600;
    }
    .btn-download:hover { background: #047857; }

    /* ── Template Switcher ────────────────────────────────── */
    .template-switcher {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      background: #0d0d14;
      border-bottom: 1px solid #1e1e2e;
      flex-wrap: wrap;
    }

    .template-btn {
      padding: 6px 14px;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      background: transparent;
      color: #64748b;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .template-btn:hover { color: #94a3b8; border-color: #2d2d3d; }
    .template-btn.active {
      background: #f59e0b15;
      border-color: #f59e0b;
      color: #fbbf24;
    }

    /* ── Progress Bar ─────────────────────────────────────── */
    .progress-container {
      padding: 0 24px;
      display: none;
    }
    .progress-container.visible { display: block; padding-top: 16px; }

    .progress-bar {
      height: 4px;
      background: #1e1e2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      border-radius: 2px;
      transition: width 0.15s;
      width: 0%;
    }

    .progress-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Stats Bar ────────────────────────────────────────── */
    .stats-bar {
      display: none;
      gap: 24px;
      padding: 12px 24px;
      font-size: 13px;
      align-items: center;
    }
    .stats-bar.visible { display: flex; }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat .label { color: #475569; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat .value { color: #e2e8f0; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .stat .value.gpu { color: #22c55e; }

    /* ── Card Grid ────────────────────────────────────────── */
    .grid-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card-grid .card-cell {
      border-radius: 8px;
      overflow: hidden;
      background: #111118;
      border: 1px solid #1e1e2e;
      aspect-ratio: 400 / 560;
      position: relative;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .card-cell:hover {
      transform: scale(1.03);
      border-color: #3d3d5c;
    }

    .card-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-cell .card-index {
      position: absolute;
      top: 4px;
      right: 6px;
      font-size: 9px;
      color: #ffffff40;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Empty state ──────────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #334155;
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; }

    /* ── Status Bar ───────────────────────────────────────── */
    .status-bar {
      padding: 6px 16px;
      background: #111118;
      border-top: 1px solid #1e1e2e;
      font-size: 11px;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .status-bar .powered {
      margin-left: auto;
      color: #334155;
    }

    .gpu-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .gpu-badge.webgpu { background: #22c55e20; color: #22c55e; }
    .gpu-badge.webgl2 { background: #3b82f620; color: #3b82f6; }
    .gpu-badge.none   { background: #64748b20; color: #64748b; }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e2e;
      color: #e2e8f0;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #2d2d3d;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Lightbox ─────────────────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000000cc;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .lightbox.open {
      display: flex;
      opacity: 1;
    }
    .lightbox.fade-in {
      opacity: 1;
    }

    .lightbox-card {
      max-height: 90vh;
      max-width: 90vw;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 0 60px #00000080;
    }

    .lightbox-info {
      margin-top: 16px;
      font-size: 13px;
      color: #94a3b8;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
    }

    .lightbox-nav {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 15%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff40;
      font-size: 32px;
      transition: color 0.15s;
      user-select: none;
    }
    .lightbox-nav:hover { color: #ffffffaa; }
    .lightbox-nav.prev { left: 0; }
    .lightbox-nav.next { right: 0; }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 24px;
      color: #ffffff60;
      font-size: 28px;
      cursor: pointer;
      transition: color 0.15s;
      user-select: none;
      z-index: 210;
    }
    .lightbox-close:hover { color: #ffffffcc; }
  </style>
</head>
<body>
  <header>
    <div class="logo">SVG OS <span>/ demo</span></div>
    <h1>100 Cards, 3 Seconds</h1>
    <div class="header-actions">
      <span class="gpu-badge none" id="gpu-badge">detecting...</span>
      <button class="btn btn-primary" id="btn-generate" disabled>Generate 100 Cards</button>
      <button class="btn btn-download" id="btn-download" disabled>Download ZIP</button>
    </div>
  </header>

  <div class="template-switcher">
    <button class="template-btn active" data-template="scouting-report">FIFA Cards</button>
    <button class="template-btn" data-template="shader-card">Shader Art</button>
    <button class="template-btn" data-template="game-achievement">Achievements</button>
    <button class="template-btn" data-template="profile-hud">Player HUDs</button>
    <button class="template-btn" data-template="match-card">Match Results</button>
  </div>

  <div class="progress-container" id="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 100</div>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><span class="label">Cards</span><span class="value" id="stat-count">—</span></div>
    <div class="stat"><span class="label">Time</span><span class="value" id="stat-time">—</span></div>
    <div class="stat"><span class="label">Speed</span><span class="value" id="stat-speed">—</span></div>
    <div class="stat"><span class="label">Backend</span><span class="value gpu" id="stat-backend">—</span></div>
  </div>

  <div class="grid-container" id="grid-container">
    <div class="empty-state" id="empty-state">
      <div class="icon">&#9632; &#9632; &#9632;</div>
      <p>Click "Generate 100 Cards" to batch-render with GPU shaders</p>
    </div>
    <div class="card-grid" id="card-grid" style="display:none"></div>
  </div>

  <div class="status-bar">
    <span id="status-text">Loading...</span>
    <span class="powered">SVG OS — GPU batch rendering engine</span>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Lightbox overlay -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightbox-close">✕</div>
    <div class="lightbox-nav prev" id="lightbox-prev">‹</div>
    <div class="lightbox-nav next" id="lightbox-next">›</div>
    <img class="lightbox-card" id="lightbox-img" src="" alt="Card preview" />
    <div class="lightbox-info" id="lightbox-info"></div>
  </div>

  <script type="module" src="./src/cards-main.ts"></script>
</body>
</html>
