<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG OS — Architecture in One Click</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: #111118;
      border-bottom: 1px solid #1e1e2e;
      height: 56px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      color: #6366f1;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .logo span { color: #94a3b8; font-weight: 400; }

    header h1 {
      font-size: 15px;
      font-weight: 500;
      color: #cbd5e1;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      padding: 8px 16px;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      background: #16161f;
      color: #94a3b8;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: #1e1e2e; color: #e2e8f0; border-color: #3d3d5c; }

    .btn-primary {
      background: #6366f1;
      border-color: #818cf8;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 24px;
    }
    .btn-primary:hover { background: #4f46e5; }

    .btn-export {
      background: #065f46;
      border-color: #10b981;
      color: #6ee7b7;
    }
    .btn-export:hover { background: #047857; }

    /* ── Main Layout ─────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── JSON Editor Panel ───────────────────────────────────── */
    .editor-panel {
      width: 35%;
      min-width: 320px;
      background: #111118;
      border-right: 1px solid #1e1e2e;
      display: flex;
      flex-direction: column;
    }

    .editor-header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-header h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6366f1;
    }

    .editor-header .hint {
      font-size: 11px;
      color: #475569;
    }

    #json-editor {
      flex: 1;
      width: 100%;
      padding: 16px;
      background: #0a0a0f;
      border: none;
      color: #c4b5fd;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    .editor-footer {
      padding: 12px 16px;
      border-top: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .node-count {
      font-size: 11px;
      color: #475569;
      margin-left: auto;
    }

    /* ── Canvas Panel ────────────────────────────────────────── */
    .canvas-panel {
      flex: 1;
      background: #0d0d14;
      background-image:
        radial-gradient(circle, #ffffff05 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #canvas-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }

    #canvas-container.dragging { cursor: grabbing; }

    #canvas-container svg {
      position: absolute;
      top: 50%;
      left: 50%;
    }

    /* ── Status Bar ──────────────────────────────────────────── */
    .status-bar {
      padding: 6px 16px;
      background: #111118;
      border-top: 1px solid #1e1e2e;
      font-size: 11px;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .status-bar .powered {
      margin-left: auto;
      color: #334155;
    }

    .status-bar .powered a {
      color: #6366f1;
      text-decoration: none;
    }

    /* ── Diagram node styles ─────────────────────────────────── */
    .diagram-node { cursor: move; transition: opacity 0.3s ease, filter 0.3s ease; }
    .diagram-node rect { transition: stroke 0.3s ease, stroke-width 0.3s ease, filter 0.3s ease; }
    .diagram-node.highlight-focus rect { stroke-width: 3px; }
    .diagram-node.highlight-upstream rect { stroke: #60a5fa !important; stroke-width: 2.5px; }
    .diagram-node.highlight-downstream rect { stroke: #fbbf24 !important; stroke-width: 2.5px; }
    .diagram-node.highlight-dimmed { opacity: 0.2; }

    .connector-path { transition: stroke 0.3s ease, stroke-width 0.3s ease, stroke-opacity 0.3s ease; }
    .connector-path.highlight-upstream { stroke: #60a5fa !important; stroke-width: 3 !important; stroke-opacity: 1 !important; }
    .connector-path.highlight-downstream { stroke: #fbbf24 !important; stroke-width: 3 !important; stroke-opacity: 1 !important; }
    .connector-path.highlight-dimmed { stroke-opacity: 0.1 !important; }

    .connection-badge { pointer-events: none; }

    /* ── Animations ──────────────────────────────────────────── */
    @keyframes dash-flow {
      to { stroke-dashoffset: -24; }
    }

    @keyframes hub-pulse {
      0%, 100% { filter: brightness(1.0); }
      50% { filter: brightness(1.1); }
    }

    @keyframes node-entrance {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes edge-draw {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }

    .node-hub rect { animation: hub-pulse 3s ease-in-out infinite; }

    /* ── Tooltip ─────────────────────────────────────────────── */
    .diagram-tooltip {
      position: fixed;
      padding: 10px 14px;
      background: #1a1a2e;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      font-size: 12px;
      color: #e2e8f0;
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .diagram-tooltip.visible { opacity: 1; }
    .diagram-tooltip .tt-label { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .diagram-tooltip .tt-type {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .diagram-tooltip .tt-stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
    }

    /* ── Toast ───────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e2e;
      color: #e2e8f0;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #2d2d3d;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Error state ─────────────────────────────────────────── */
    .error-msg {
      color: #f87171;
      font-size: 12px;
      padding: 4px 0;
    }

    /* ── Loading overlay ─────────────────────────────────────── */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #0d0d14ee;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .loading-overlay .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #1e1e2e;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div class="logo">SVG OS <span>/ demo</span></div>
    <h1>Architecture in One Click</h1>
    <div class="header-actions">
      <button class="btn btn-export" id="btn-export" disabled>Export SVG</button>
    </div>
  </header>

  <main>
    <div class="editor-panel">
      <div class="editor-header">
        <h2>Graph Data</h2>
        <span class="hint">JSON nodes + edges</span>
      </div>
      <textarea id="json-editor" spellcheck="false"></textarea>
      <div class="editor-footer">
        <button class="btn btn-primary" id="btn-generate">Generate</button>
        <button class="btn" id="btn-reset">Reset</button>
        <span class="node-count" id="node-count"></span>
        <div class="error-msg" id="error-msg"></div>
      </div>
    </div>

    <div class="canvas-panel">
      <div id="canvas-container">
        <div class="loading-overlay" id="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="status-bar">
    <span id="status-text">Initializing WASM engine...</span>
    <span id="status-elements"></span>
    <span id="status-time"></span>
    <span class="powered">Powered by <a href="#">SVG OS</a> — Rust WASM + Sugiyama layout</span>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Tooltip overlay (HTML, not SVG) -->
  <div class="diagram-tooltip" id="diagram-tooltip">
    <div class="tt-label"></div>
    <div class="tt-type"></div>
    <div class="tt-stats"></div>
  </div>

  <script type="module">
    import {
      loadWasm,
      rootId, createNode, setAttr, removeNode,
      getFullRenderOps, applyOps, resetElementMap,
      exportSvg, importSvg,
      addDefaultPorts, addConnector, updateConnectors, autoLayout,
      generateDiagram, getElement, getNodeInfo,
      getConnectors,
    } from "@svg-os/bridge";

    // ── Default graph data ─────────────────────────────────────
    const DEFAULT_DATA = {
      nodes: [
        { id: "lb", label: "Load Balancer", type: "external" },
        { id: "api", label: "API Gateway", type: "service" },
        { id: "auth", label: "Auth Service", type: "service" },
        { id: "users", label: "User Service", type: "service" },
        { id: "cache", label: "Redis", type: "cache" },
        { id: "db", label: "PostgreSQL", type: "database" },
        { id: "queue", label: "RabbitMQ", type: "queue" },
        { id: "worker", label: "Email Worker", type: "service" },
        { id: "s3", label: "Object Storage", type: "external" },
      ],
      edges: [
        { from: "lb", to: "api" },
        { from: "api", to: "auth" },
        { from: "api", to: "users" },
        { from: "api", to: "cache" },
        { from: "users", to: "db" },
        { from: "auth", to: "db" },
        { from: "users", to: "queue" },
        { from: "queue", to: "worker" },
        { from: "worker", to: "s3" },
      ],
    };

    // ── Type → color mapping ───────────────────────────────────
    const TYPE_COLORS = {
      service:  { fill: "#1e3a5f", stroke: "#3b82f6", text: "#93c5fd", light: "#2d4f7a" },
      database: { fill: "#1a3329", stroke: "#22c55e", text: "#86efac", light: "#254a3a" },
      cache:    { fill: "#3b1a1a", stroke: "#ef4444", text: "#fca5a5", light: "#4f2525" },
      queue:    { fill: "#2d1f4e", stroke: "#a855f7", text: "#d8b4fe", light: "#3d2d64" },
      external: { fill: "#1a2332", stroke: "#64748b", text: "#94a3b8", light: "#253344" },
    };

    const DEFAULT_COLOR = { fill: "#1e293b", stroke: "#475569", text: "#cbd5e1", light: "#2a3a4f" };

    // ── DOM refs ───────────────────────────────────────────────
    const jsonEditor = document.getElementById("json-editor");
    const container = document.getElementById("canvas-container");
    const btnGenerate = document.getElementById("btn-generate");
    const btnExport = document.getElementById("btn-export");
    const btnReset = document.getElementById("btn-reset");
    const statusText = document.getElementById("status-text");
    const statusElements = document.getElementById("status-elements");
    const statusTime = document.getElementById("status-time");
    const nodeCountEl = document.getElementById("node-count");
    const errorMsg = document.getElementById("error-msg");
    const loadingOverlay = document.getElementById("loading");
    const toastEl = document.getElementById("toast");
    const tooltipEl = document.getElementById("diagram-tooltip");

    // ── State ──────────────────────────────────────────────────
    let nodeMap = {};          // graph id → WASM node id
    let graphData = null;      // parsed JSON
    let topology = null;       // computed topology data
    let isDragging = false;
    let dragNodeId = null;
    let dragStart = { x: 0, y: 0 };
    let dragNodeStart = { x: 0, y: 0 };
    let viewOffset = { x: 0, y: 0 };
    let isPanning = false;
    let panStart = { x: 0, y: 0 };

    // ── Toast ──────────────────────────────────────────────────
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 2500);
    }

    // ══════════════════════════════════════════════════════════════
    // ── TOPOLOGY ANALYSIS ENGINE ─────────────────────────────────
    // ══════════════════════════════════════════════════════════════

    function computeTopology(data) {
      const nodes = {};
      for (const n of data.nodes) {
        nodes[n.id] = {
          id: n.id,
          label: n.label,
          type: n.type,
          inDegree: 0,
          outDegree: 0,
          degree: 0,
          weight: 0,
          isHub: false,
          isLeaf: false,
          upstream: new Set(),
          downstream: new Set(),
          inEdges: [],   // edge indices coming in
          outEdges: [],  // edge indices going out
        };
      }

      // Count degrees
      for (let i = 0; i < data.edges.length; i++) {
        const e = data.edges[i];
        if (nodes[e.from]) { nodes[e.from].outDegree++; nodes[e.from].outEdges.push(i); }
        if (nodes[e.to])   { nodes[e.to].inDegree++;   nodes[e.to].inEdges.push(i); }
      }

      let maxDegree = 1;
      for (const n of Object.values(nodes)) {
        n.degree = n.inDegree + n.outDegree;
        if (n.degree > maxDegree) maxDegree = n.degree;
      }

      for (const n of Object.values(nodes)) {
        n.weight = n.degree / maxDegree;
        n.isHub = n.degree >= 3;
        n.isLeaf = n.degree <= 1;
      }

      // BFS upstream (reverse edges)
      function bfsReverse(startId) {
        const visited = new Set();
        const queue = [startId];
        while (queue.length) {
          const cur = queue.shift();
          for (const e of data.edges) {
            if (e.to === cur && !visited.has(e.from)) {
              visited.add(e.from);
              queue.push(e.from);
            }
          }
        }
        return visited;
      }

      // BFS downstream (forward edges)
      function bfsForward(startId) {
        const visited = new Set();
        const queue = [startId];
        while (queue.length) {
          const cur = queue.shift();
          for (const e of data.edges) {
            if (e.from === cur && !visited.has(e.to)) {
              visited.add(e.to);
              queue.push(e.to);
            }
          }
        }
        return visited;
      }

      for (const n of Object.values(nodes)) {
        n.upstream = bfsReverse(n.id);
        n.downstream = bfsForward(n.id);
      }

      return { nodes, maxDegree };
    }

    // Build reverse map: WASM id → graph id
    function buildWasmIdToGraphId() {
      const map = {};
      for (const [graphId, wasmId] of Object.entries(nodeMap)) {
        map[wasmId] = graphId;
      }
      return map;
    }

    // ══════════════════════════════════════════════════════════════
    // ── SVG FILTERS + GRADIENTS ──────────────────────────────────
    // ══════════════════════════════════════════════════════════════

    function injectFilters(svg) {
      let defs = svg.querySelector("defs");
      if (!defs) {
        defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        svg.insertBefore(defs, svg.firstChild);
      }

      // Clear old generated filters/gradients
      for (const el of [...defs.querySelectorAll("[data-generated]")]) el.remove();

      const ns = "http://www.w3.org/2000/svg";

      // Helper: create filter
      function addFilter(id, inner) {
        const f = document.createElementNS(ns, "filter");
        f.setAttribute("id", id);
        f.setAttribute("data-generated", "1");
        f.setAttribute("x", "-50%"); f.setAttribute("y", "-50%");
        f.setAttribute("width", "200%"); f.setAttribute("height", "200%");
        f.innerHTML = inner;
        defs.appendChild(f);
      }

      // glow-hub: hub node glow
      addFilter("glow-hub", `
        <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
        <feFlood flood-color="#6366f1" flood-opacity="0.4" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="glow"/>
        <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
      `);

      // glow-active: hovered node glow
      addFilter("glow-active", `
        <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
        <feFlood flood-color="#818cf8" flood-opacity="0.6" result="color"/>
        <feComposite in="color" in2="blur" operator="in" result="glow"/>
        <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
      `);

      // Shadow tiers
      addFilter("shadow-1", `<feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" flood-color="#000"/>`);
      addFilter("shadow-2", `<feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4" flood-color="#000"/>`);
      addFilter("shadow-3", `<feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.5" flood-color="#000"/>`);

      // Per-type gradient fills (lighter top → original bottom)
      for (const [type, colors] of Object.entries(TYPE_COLORS)) {
        const grad = document.createElementNS(ns, "linearGradient");
        grad.setAttribute("id", `grad-${type}`);
        grad.setAttribute("x1", "0"); grad.setAttribute("y1", "0");
        grad.setAttribute("x2", "0"); grad.setAttribute("y2", "1");
        grad.setAttribute("data-generated", "1");
        grad.innerHTML = `
          <stop offset="0%" stop-color="${colors.light}"/>
          <stop offset="100%" stop-color="${colors.fill}"/>
        `;
        defs.appendChild(grad);
      }

      // Default gradient
      const defGrad = document.createElementNS(ns, "linearGradient");
      defGrad.setAttribute("id", "grad-default");
      defGrad.setAttribute("x1", "0"); defGrad.setAttribute("y1", "0");
      defGrad.setAttribute("x2", "0"); defGrad.setAttribute("y2", "1");
      defGrad.setAttribute("data-generated", "1");
      defGrad.innerHTML = `
        <stop offset="0%" stop-color="${DEFAULT_COLOR.light}"/>
        <stop offset="100%" stop-color="${DEFAULT_COLOR.fill}"/>
      `;
      defs.appendChild(defGrad);

      // Arrowhead marker (default)
      if (!defs.querySelector("#arrowhead")) {
        const marker = document.createElementNS(ns, "marker");
        marker.setAttribute("id", "arrowhead");
        marker.setAttribute("viewBox", "0 0 10 10");
        marker.setAttribute("refX", "9");
        marker.setAttribute("refY", "5");
        marker.setAttribute("markerWidth", "8");
        marker.setAttribute("markerHeight", "8");
        marker.setAttribute("orient", "auto-start-reverse");
        const arrowPath = document.createElementNS(ns, "path");
        arrowPath.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
        arrowPath.setAttribute("fill", "#475569");
        marker.appendChild(arrowPath);
        defs.appendChild(marker);
      }

      // Per-type colored arrowhead markers
      for (const [type, colors] of Object.entries(TYPE_COLORS)) {
        const mid = `arrow-${type}`;
        if (!defs.querySelector(`#${mid}`)) {
          const marker = document.createElementNS(ns, "marker");
          marker.setAttribute("id", mid);
          marker.setAttribute("data-generated", "1");
          marker.setAttribute("viewBox", "0 0 10 10");
          marker.setAttribute("refX", "9");
          marker.setAttribute("refY", "5");
          marker.setAttribute("markerWidth", "8");
          marker.setAttribute("markerHeight", "8");
          marker.setAttribute("orient", "auto-start-reverse");
          const ap = document.createElementNS(ns, "path");
          ap.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
          // Blend type color with gray
          ap.setAttribute("fill", blendColor(colors.stroke, "#475569", 0.5));
          marker.appendChild(ap);
          defs.appendChild(marker);
        }
      }
    }

    // Simple hex color blend
    function blendColor(c1, c2, t) {
      const r1 = parseInt(c1.slice(1,3), 16), g1 = parseInt(c1.slice(3,5), 16), b1 = parseInt(c1.slice(5,7), 16);
      const r2 = parseInt(c2.slice(1,3), 16), g2 = parseInt(c2.slice(3,5), 16), b2 = parseInt(c2.slice(5,7), 16);
      const r = Math.round(r1 * (1-t) + r2 * t);
      const g = Math.round(g1 * (1-t) + g2 * t);
      const b = Math.round(b1 * (1-t) + b2 * t);
      return `#${r.toString(16).padStart(2,"0")}${g.toString(16).padStart(2,"0")}${b.toString(16).padStart(2,"0")}`;
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    // ══════════════════════════════════════════════════════════════
    // ── TOPOLOGY-AWARE NODE STYLING ──────────────────────────────
    // ══════════════════════════════════════════════════════════════

    function applyTopologyStyles() {
      const svg = container.querySelector("svg");
      if (!svg || !topology || !graphData) return;

      for (const node of graphData.nodes) {
        const wasmId = nodeMap[node.id];
        if (!wasmId) continue;
        const el = svg.querySelector(`[data-node-id="${wasmId}"]`);
        if (!el) continue;

        const topo = topology.nodes[node.id];
        if (!topo) continue;

        const colors = TYPE_COLORS[node.type] || DEFAULT_COLOR;
        const w = topo.weight;

        // CSS classes
        el.classList.add("diagram-node");
        if (topo.isHub) el.classList.add("node-hub");
        if (topo.isLeaf) el.classList.add("node-leaf");
        el.classList.add(`node-${node.type || "default"}`);
        el.dataset.graphId = node.id;

        // Style rect children
        const rect = el.querySelector("rect");
        if (rect) {
          // Gradient fill instead of flat
          const gradId = TYPE_COLORS[node.type] ? `grad-${node.type}` : "grad-default";
          rect.setAttribute("fill", `url(#${gradId})`);

          // Stroke width scales with topology weight
          rect.setAttribute("stroke-width", String(lerp(1.5, 4, w).toFixed(1)));

          // Border radius scales
          const rx = Math.round(lerp(6, 12, w));
          rect.setAttribute("rx", String(rx));
          rect.setAttribute("ry", String(rx));

          // Shadow tier based on degree
          let shadowFilter;
          if (topo.degree >= 4) shadowFilter = "url(#shadow-3)";
          else if (topo.degree >= 2) shadowFilter = "url(#shadow-2)";
          else shadowFilter = "url(#shadow-1)";

          // Hubs also get glow
          if (topo.isHub) {
            el.style.filter = "url(#glow-hub)";
          }
        }

        // Connection badge: "N↓ N↑" below node
        const badge = document.createElementNS("http://www.w3.org/2000/svg", "text");
        badge.classList.add("connection-badge");
        badge.setAttribute("text-anchor", "middle");
        badge.setAttribute("font-family", "'JetBrains Mono', monospace");
        badge.setAttribute("font-size", "9");
        badge.setAttribute("fill", "#64748b");

        // Position below the rect
        if (rect) {
          const rectH = parseFloat(rect.getAttribute("height") || "40");
          const rectW = parseFloat(rect.getAttribute("width") || "120");
          badge.setAttribute("x", String(rectW / 2));
          badge.setAttribute("y", String(rectH + 16));
        }
        badge.textContent = `${topo.inDegree}↓ ${topo.outDegree}↑`;
        el.appendChild(badge);
      }
    }

    // ══════════════════════════════════════════════════════════════
    // ── EDGE INTELLIGENCE ────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════

    function applyEdgeStyles() {
      const svg = container.querySelector("svg");
      if (!svg || !topology || !graphData) return;

      const wasmToGraph = buildWasmIdToGraphId();
      let connectors;
      try { connectors = getConnectors(); } catch { connectors = []; }

      // Map connector path_node WASM id → connector info
      const connectorMap = new Map();
      for (const c of connectors) {
        connectorMap.set(c.path_node, c);
      }

      const paths = svg.querySelectorAll("path");
      let pathIdx = 0;

      for (const path of paths) {
        path.classList.add("connector-path");

        // Try to match this path to a connector
        const nodeId = path.getAttribute("data-node-id");
        const conn = nodeId ? connectorMap.get(nodeId) : null;

        let sourceGraphId = null;
        let sourceType = null;
        let sourceWeight = 0.5;

        if (conn) {
          // conn.from is [wasmId, portName]
          const fromWasmId = conn.from[0];
          sourceGraphId = wasmToGraph[fromWasmId];
          if (sourceGraphId && topology.nodes[sourceGraphId]) {
            sourceType = topology.nodes[sourceGraphId].type;
            sourceWeight = topology.nodes[sourceGraphId].weight;
          }

          // Store edge metadata on path for interaction
          const toWasmId = conn.to[0];
          const toGraphId = wasmToGraph[toWasmId];
          path.dataset.fromId = sourceGraphId || "";
          path.dataset.toId = toGraphId || "";
        } else {
          // Fallback: use edge order
          if (pathIdx < graphData.edges.length) {
            const edge = graphData.edges[pathIdx];
            sourceGraphId = edge.from;
            if (topology.nodes[sourceGraphId]) {
              sourceType = topology.nodes[sourceGraphId].type;
              sourceWeight = topology.nodes[sourceGraphId].weight;
            }
            path.dataset.fromId = edge.from;
            path.dataset.toId = edge.to;
          }
        }

        const colors = TYPE_COLORS[sourceType] || DEFAULT_COLOR;

        // Stroke width scales: hub-originating edges are thicker
        const sw = (1.5 + sourceWeight * 2.5).toFixed(1);
        path.setAttribute("stroke-width", sw);

        // Stroke color: blend source type color with gray
        const edgeColor = blendColor(colors.stroke, "#475569", 0.4);
        path.setAttribute("stroke", edgeColor);
        path.setAttribute("fill", "none");

        // Type-tinted arrowhead
        const arrowId = sourceType ? `arrow-${sourceType}` : "arrowhead";
        path.setAttribute("marker-end", `url(#${arrowId})`);

        // Animated data flow: dashed with flowing animation
        path.setAttribute("stroke-dasharray", "8 4");
        const speed = (2 - sourceWeight).toFixed(1);
        path.style.animation = `dash-flow ${speed}s linear infinite`;

        pathIdx++;
      }
    }

    // ══════════════════════════════════════════════════════════════
    // ── INTERACTIVE DEPENDENCY HIGHLIGHTING ───────────────────────
    // ══════════════════════════════════════════════════════════════

    function setupInteractions() {
      const svg = container.querySelector("svg");
      if (!svg || !topology) return;

      for (const node of svg.querySelectorAll(".diagram-node")) {
        node.addEventListener("mouseenter", (e) => {
          if (isDragging) return;
          const graphId = node.dataset.graphId;
          if (!graphId) return;
          highlightDependencies(graphId);
          showDiagramTooltip(e, graphId);
        });

        node.addEventListener("mousemove", (e) => {
          if (isDragging) return;
          moveDiagramTooltip(e);
        });

        node.addEventListener("mouseleave", () => {
          clearHighlights();
          hideDiagramTooltip();
        });
      }
    }

    function highlightDependencies(focusId) {
      const svg = container.querySelector("svg");
      if (!svg || !topology) return;

      const topo = topology.nodes[focusId];
      if (!topo) return;

      // Classify all nodes
      for (const nodeEl of svg.querySelectorAll(".diagram-node")) {
        const gid = nodeEl.dataset.graphId;
        if (gid === focusId) {
          nodeEl.classList.add("highlight-focus");
          nodeEl.style.filter = "url(#glow-active)";
        } else if (topo.upstream.has(gid)) {
          nodeEl.classList.add("highlight-upstream");
        } else if (topo.downstream.has(gid)) {
          nodeEl.classList.add("highlight-downstream");
        } else {
          nodeEl.classList.add("highlight-dimmed");
        }
      }

      // Classify all edges
      for (const path of svg.querySelectorAll(".connector-path")) {
        const from = path.dataset.fromId;
        const to = path.dataset.toId;

        if (from === focusId || (topo.upstream.has(from) && (to === focusId || topo.upstream.has(to)))) {
          // Upstream edge (leads toward focus)
          if (to === focusId || topo.upstream.has(to)) {
            path.classList.add("highlight-upstream");
          }
        }
        if (to === focusId || (from === focusId || topo.upstream.has(from)) && topo.downstream.has(to)) {
          // Downstream edge (leads away from focus)
          if (from === focusId || topo.downstream.has(from)) {
            path.classList.add("highlight-downstream");
          }
        }

        // If neither upstream nor downstream, dim it
        if (!path.classList.contains("highlight-upstream") && !path.classList.contains("highlight-downstream")) {
          // Check if edge connects to focus directly
          if (from === focusId) {
            path.classList.add("highlight-downstream");
          } else if (to === focusId) {
            path.classList.add("highlight-upstream");
          } else {
            path.classList.add("highlight-dimmed");
          }
        }
      }
    }

    function clearHighlights() {
      const svg = container.querySelector("svg");
      if (!svg) return;

      for (const el of svg.querySelectorAll(".diagram-node")) {
        el.classList.remove("highlight-focus", "highlight-upstream", "highlight-downstream", "highlight-dimmed");
        // Restore hub glow or remove
        const gid = el.dataset.graphId;
        if (gid && topology?.nodes[gid]?.isHub) {
          el.style.filter = "url(#glow-hub)";
        } else {
          el.style.filter = "";
        }
      }

      for (const el of svg.querySelectorAll(".connector-path")) {
        el.classList.remove("highlight-upstream", "highlight-downstream", "highlight-dimmed");
      }
    }

    // ── Tooltip ─────────────────────────────────────────────────

    function showDiagramTooltip(e, graphId) {
      const topo = topology?.nodes[graphId];
      if (!topo) return;

      const colors = TYPE_COLORS[topo.type] || DEFAULT_COLOR;
      tooltipEl.querySelector(".tt-label").textContent = topo.label;

      const typePill = tooltipEl.querySelector(".tt-type");
      typePill.textContent = (topo.type || "unknown").toUpperCase();
      typePill.style.background = colors.fill;
      typePill.style.color = colors.text;
      typePill.style.border = `1px solid ${colors.stroke}`;

      tooltipEl.querySelector(".tt-stats").innerHTML =
        `← ${topo.inDegree} in  ·  ${topo.outDegree} out →<br>` +
        `Upstream: ${topo.upstream.size} · Downstream: ${topo.downstream.size}`;

      tooltipEl.classList.add("visible");
      moveDiagramTooltip(e);
    }

    function moveDiagramTooltip(e) {
      tooltipEl.style.left = `${e.clientX + 16}px`;
      tooltipEl.style.top = `${e.clientY - 10}px`;
    }

    function hideDiagramTooltip() {
      tooltipEl.classList.remove("visible");
    }

    // ══════════════════════════════════════════════════════════════
    // ── LOAD ANIMATION ───────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════

    function animateEntrance() {
      const svg = container.querySelector("svg");
      if (!svg) return;

      const nodes = [...svg.querySelectorAll(".diagram-node")];
      const paths = [...svg.querySelectorAll(".connector-path")];

      // Sort nodes by Y position → assign layers for staggered entrance
      nodes.sort((a, b) => {
        const ay = parseFloat((a.getAttribute("transform") || "").replace(/translate\(([-\d.]+)[,\s]+([-\d.]+)\)/, "$2")) || 0;
        const by = parseFloat((b.getAttribute("transform") || "").replace(/translate\(([-\d.]+)[,\s]+([-\d.]+)\)/, "$2")) || 0;
        return ay - by;
      });

      // Initially hide everything
      nodes.forEach(n => { n.style.opacity = "0"; });
      paths.forEach(p => {
        p.style.opacity = "0";
        // Pause dash-flow during entrance
        const savedAnim = p.style.animation;
        p.dataset.savedAnim = savedAnim;
        p.style.animation = "none";
      });

      // Stagger node entrance by layer (150ms between layers)
      let lastY = -Infinity;
      let layer = 0;
      const layerMap = [];
      for (const n of nodes) {
        const y = parseFloat((n.getAttribute("transform") || "").replace(/translate\(([-\d.]+)[,\s]+([-\d.]+)\)/, "$2")) || 0;
        if (y > lastY + 20) { layer++; lastY = y; }
        layerMap.push(layer);
      }

      nodes.forEach((n, i) => {
        const delay = layerMap[i] * 150;
        setTimeout(() => {
          n.style.transition = "opacity 0.4s ease, transform 0.4s ease";
          n.style.opacity = "1";
        }, delay);
      });

      // Edges draw in after all nodes
      const totalNodeDelay = (layer + 1) * 150 + 400;
      paths.forEach((p, i) => {
        setTimeout(() => {
          // Edge draw-in via stroke-dashoffset
          const len = p.getTotalLength ? p.getTotalLength() : 200;
          p.style.strokeDasharray = `${len}`;
          p.style.strokeDashoffset = `${len}`;
          p.style.opacity = "1";
          p.style.transition = "stroke-dashoffset 0.6s ease";
          requestAnimationFrame(() => {
            p.style.strokeDashoffset = "0";
          });

          // After draw completes, switch to flowing dash animation
          setTimeout(() => {
            p.style.transition = "";
            p.style.strokeDasharray = "8 4";
            p.style.strokeDashoffset = "";
            if (p.dataset.savedAnim) {
              p.style.animation = p.dataset.savedAnim;
              delete p.dataset.savedAnim;
            }
          }, 650);
        }, totalNodeDelay + i * 40);
      });
    }

    // ── Init ───────────────────────────────────────────────────
    async function init() {
      jsonEditor.value = JSON.stringify(DEFAULT_DATA, null, 2);
      updateNodeCount();

      try {
        await loadWasm();
        loadingOverlay.remove();
        statusText.textContent = "Ready";
        btnGenerate.disabled = false;
        generate();
      } catch (e) {
        statusText.textContent = `WASM failed: ${e}`;
        loadingOverlay.querySelector(".spinner").style.borderTopColor = "#f87171";
        console.error(e);
      }
    }

    // ── Parse + validate JSON ──────────────────────────────────
    function parseInput() {
      errorMsg.textContent = "";
      try {
        const data = JSON.parse(jsonEditor.value);
        if (!Array.isArray(data.nodes) || !Array.isArray(data.edges)) {
          throw new Error("JSON must have 'nodes' and 'edges' arrays");
        }
        for (const n of data.nodes) {
          if (!n.id || !n.label) throw new Error(`Node missing id/label: ${JSON.stringify(n)}`);
        }
        for (const e of data.edges) {
          if (!e.from || !e.to) throw new Error(`Edge missing from/to: ${JSON.stringify(e)}`);
        }
        return data;
      } catch (e) {
        errorMsg.textContent = e.message;
        return null;
      }
    }

    // ── Fix group positions ────────────────────────────────────
    function fixGroupPositions() {
      const svg = container.querySelector("svg");
      if (!svg) return;
      for (const g of svg.querySelectorAll("g")) {
        const x = parseFloat(g.getAttribute("x"));
        const y = parseFloat(g.getAttribute("y"));
        if ((x && x !== 0) || (y && y !== 0)) {
          g.setAttribute("transform", `translate(${x || 0}, ${y || 0})`);
          g.removeAttribute("x");
          g.removeAttribute("y");
        }
      }
    }

    // ── Style SVG container ────────────────────────────────────
    function styleSvgContainer(svg) {
      if (!svg) return;
      svg.style.transform = `translate(calc(-50% + ${viewOffset.x}px), calc(-50% + ${viewOffset.y}px))`;
      svg.style.transformOrigin = "center center";
      svg.style.filter = "drop-shadow(0 8px 32px rgba(99, 102, 241, 0.15))";
      svg.style.background = "#0f0f1a";
      svg.style.borderRadius = "12px";
    }

    // ── Generate diagram ───────────────────────────────────────
    function generate() {
      const data = parseInput();
      if (!data) return;

      const t0 = performance.now();
      graphData = data;

      // Reset the SVG document
      importSvg('<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800"></svg>');

      // Generate the diagram using the WASM Sugiyama layout engine
      const result = generateDiagram(data, {
        direction: "TopToBottom",
        nodeGap: 60,
        layerGap: 120,
      });

      nodeMap = result.nodeMap;

      // Style nodes by type (WASM-side attributes)
      for (const node of data.nodes) {
        const wasmId = nodeMap[node.id];
        if (!wasmId) continue;
        const colors = TYPE_COLORS[node.type] || DEFAULT_COLOR;
        try {
          const info = getNodeInfo(wasmId);
          for (const childId of info.children) {
            const childInfo = getNodeInfo(childId);
            if (childInfo.tag === "rect") {
              setAttr(childId, "fill", colors.fill);
              setAttr(childId, "stroke", colors.stroke);
              setAttr(childId, "stroke-width", "2");
              setAttr(childId, "rx", "8");
              setAttr(childId, "ry", "8");
            } else if (childInfo.tag === "text") {
              setAttr(childId, "fill", colors.text);
              setAttr(childId, "font-family", "'Inter', system-ui, sans-serif");
              setAttr(childId, "font-size", "13");
              setAttr(childId, "font-weight", "500");
            }
          }
        } catch (e) {}
      }

      updateConnectors();

      // Render to DOM
      container.innerHTML = "";
      resetElementMap();
      const ops = getFullRenderOps();
      applyOps(container, ops);
      fixGroupPositions();

      const svg = container.querySelector("svg");
      styleSvgContainer(svg);

      // ── NEW: Topology-aware enhancements ──────────────
      topology = computeTopology(data);
      injectFilters(svg);
      applyTopologyStyles();
      applyEdgeStyles();
      setupDrag();
      setupInteractions();
      animateEntrance();

      const elapsed = (performance.now() - t0).toFixed(1);
      statusText.textContent = "Diagram generated";
      statusElements.textContent = `${data.nodes.length} nodes · ${data.edges.length} edges`;
      statusTime.textContent = `${elapsed}ms`;
      btnExport.disabled = false;

      showToast(`Generated ${data.nodes.length} nodes + ${data.edges.length} edges in ${elapsed}ms`);
    }

    // ── Drag interaction ───────────────────────────────────────
    function setupDrag() {
      const svg = container.querySelector("svg");
      if (!svg) return;

      for (const [graphId, wasmId] of Object.entries(nodeMap)) {
        const el = document.querySelector(`[data-node-id="${wasmId}"]`);
        if (el) {
          el.classList.add("diagram-node");
          el.dataset.graphId = graphId;
        }
      }

      svg.addEventListener("mousedown", onMouseDown);
      svg.addEventListener("mousemove", onMouseMove);
      svg.addEventListener("mouseup", onMouseUp);
      svg.addEventListener("mouseleave", onMouseUp);
    }

    function onMouseDown(e) {
      const nodeEl = e.target.closest(".diagram-node");
      if (nodeEl) {
        isDragging = true;
        hideDiagramTooltip();
        clearHighlights();
        dragNodeId = nodeEl.dataset.graphId;
        const wasmId = nodeMap[dragNodeId];
        const transform = nodeEl.getAttribute("transform") || "";
        const match = transform.match(/translate\(([-\d.]+)[,\s]+([-\d.]+)\)/);
        dragNodeStart = { x: match ? parseFloat(match[1]) : 0, y: match ? parseFloat(match[2]) : 0 };

        const svg = container.querySelector("svg");
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
        dragStart = { x: svgP.x, y: svgP.y };

        container.classList.add("dragging");
        e.preventDefault();
      } else if (e.target.tagName === "svg" || e.target === container) {
        isPanning = true;
        panStart = { x: e.clientX - viewOffset.x, y: e.clientY - viewOffset.y };
        container.classList.add("dragging");
      }
    }

    function onMouseMove(e) {
      if (isDragging && dragNodeId) {
        const svg = container.querySelector("svg");
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());

        const dx = svgP.x - dragStart.x;
        const dy = svgP.y - dragStart.y;
        const newX = dragNodeStart.x + dx;
        const newY = dragNodeStart.y + dy;

        const wasmId = nodeMap[dragNodeId];
        setAttr(wasmId, "transform", `translate(${newX}, ${newY})`);

        const el = document.querySelector(`[data-node-id="${wasmId}"]`);
        if (el) {
          el.setAttribute("transform", `translate(${newX}, ${newY})`);
        }
      } else if (isPanning) {
        viewOffset.x = e.clientX - panStart.x;
        viewOffset.y = e.clientY - panStart.y;
        const svg = container.querySelector("svg");
        if (svg) {
          svg.style.transform = `translate(calc(-50% + ${viewOffset.x}px), calc(-50% + ${viewOffset.y}px))`;
        }
      }
    }

    function onMouseUp() {
      if (isDragging) {
        isDragging = false;
        updateConnectors();
        const ops = getFullRenderOps();
        container.innerHTML = "";
        resetElementMap();
        applyOps(container, ops);
        fixGroupPositions();
        const newSvg = container.querySelector("svg");
        styleSvgContainer(newSvg);

        // Re-apply all topology effects after drag re-render
        injectFilters(newSvg);
        applyTopologyStyles();
        applyEdgeStyles();
        setupDrag();
        setupInteractions();

        dragNodeId = null;
      }
      isPanning = false;
      container.classList.remove("dragging");
    }

    // ── Export SVG ──────────────────────────────────────────────
    function doExport() {
      const svgStr = exportSvg();
      const blob = new Blob([svgStr], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "architecture-diagram.svg";
      a.click();
      URL.revokeObjectURL(url);
      showToast("SVG exported!");
    }

    // ── Node count display ─────────────────────────────────────
    function updateNodeCount() {
      try {
        const data = JSON.parse(jsonEditor.value);
        const n = data.nodes?.length || 0;
        const e = data.edges?.length || 0;
        nodeCountEl.textContent = `${n} nodes · ${e} edges`;
      } catch {
        nodeCountEl.textContent = "";
      }
    }

    // ── Event listeners ────────────────────────────────────────
    btnGenerate.addEventListener("click", generate);
    btnExport.addEventListener("click", doExport);
    btnReset.addEventListener("click", () => {
      jsonEditor.value = JSON.stringify(DEFAULT_DATA, null, 2);
      updateNodeCount();
      generate();
    });

    jsonEditor.addEventListener("input", updateNodeCount);

    jsonEditor.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        const start = jsonEditor.selectionStart;
        const end = jsonEditor.selectionEnd;
        jsonEditor.value = jsonEditor.value.substring(0, start) + "  " + jsonEditor.value.substring(end);
        jsonEditor.selectionStart = jsonEditor.selectionEnd = start + 2;
      }
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        generate();
      }
    });

    // ── Boot ───────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
