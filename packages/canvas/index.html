<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG OS Canvas</title>
  <!-- coi-serviceworker.js loaded conditionally — Vite dev server uses headers instead -->
  <script>
    // Only load COI service worker in production (not during dev/test)
    if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      const s = document.createElement('script');
      s.src = 'coi-serviceworker.js';
      document.head.appendChild(s);
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    .tlui-watermark_SEE-LICENSE, [class*="watermark"] { display: none !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
