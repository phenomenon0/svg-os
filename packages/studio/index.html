<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG OS Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;600;800&family=Instrument+Serif&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      height: 52px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: 0.04em;
    }

    header h1 span {
      color: #f59e0b;
    }

    .wasm-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: 1px solid #334155;
      background: #0f172a;
      color: #64748b;
    }

    .wasm-badge.active {
      border-color: #16a34a;
      color: #4ade80;
    }

    .wasm-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #64748b;
    }

    .wasm-badge.active .dot {
      background: #22c55e;
    }

    .header-spacer { flex: 1; }

    .header-status {
      font-size: 12px;
      color: #64748b;
    }

    .header-status .count {
      color: #94a3b8;
      font-weight: 600;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      padding: 7px 14px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #1e293b;
      color: #cbd5e1;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: #334155; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary {
      background: #d97706;
      border-color: #f59e0b;
      color: #fff;
      font-weight: 600;
    }

    .btn-primary:hover { background: #b45309; }
    .btn-primary:disabled { background: #78350f; border-color: #78350f; }

    .btn-sm {
      padding: 5px 10px;
      font-size: 11px;
      border-radius: 6px;
    }

    /* ── Main layout ─────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left panel: Templates ───────────────────────────── */
    #left-panel {
      width: 240px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 14px 16px 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      font-weight: 600;
      border-bottom: 1px solid #334155;
    }

    .gallery-grid {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .gallery-card {
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #0f172a;
    }

    .gallery-card:hover {
      border-color: #475569;
      background: #1e293b;
    }

    .gallery-card.selected {
      border-color: #f59e0b;
      background: #1e293b;
    }

    .gallery-thumb {
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      min-height: 100px;
    }

    .gallery-thumb svg {
      max-width: 100%;
      max-height: 90px;
      border-radius: 4px;
    }

    .gallery-info {
      padding: 8px 12px 10px;
    }

    .gallery-name {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 2px;
    }

    .gallery-desc {
      font-size: 10px;
      color: #64748b;
    }

    .gallery-dims {
      font-size: 10px;
      color: #475569;
      margin-top: 4px;
    }

    /* ── Center: Preview grid ────────────────────────────── */
    #center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0f172a;
    }

    #preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .preview-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #475569;
      gap: 12px;
    }

    .preview-empty-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .preview-empty-text {
      font-size: 14px;
    }

    .preview-empty-hint {
      font-size: 12px;
      color: #334155;
    }

    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .preview-card {
      border: 1px solid #334155;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
      background: #1e293b;
    }

    .preview-card:hover {
      border-color: #f59e0b;
      transform: translateY(-2px);
    }

    .preview-card svg {
      display: block;
    }

    .preview-label {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: #0f172acc;
      color: #94a3b8;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .preview-count {
      text-align: center;
      padding: 12px;
      font-size: 12px;
      color: #64748b;
    }

    /* ── Right panel: Data + Mapping ─────────────────────── */
    #right-panel {
      width: 300px;
      background: #1e293b;
      border-left: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    #right-panel .panel-section {
      padding: 16px;
      border-bottom: 1px solid #334155;
    }

    #right-panel .panel-section:last-child {
      border-bottom: none;
      flex: 1;
      overflow-y: auto;
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .btn-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .data-preview {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 10px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 10px;
      color: #94a3b8;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre;
      margin-top: 10px;
      line-height: 1.5;
    }

    .data-columns {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .column-tag {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 10px;
      color: #94a3b8;
    }

    /* ── Binding rows ────────────────────────────────────── */
    .binding-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }

    .binding-label {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .binding-type {
      font-size: 9px;
      font-weight: 700;
      width: 22px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .binding-type-text {
      background: #78350f;
      color: #fbbf24;
    }

    .binding-type-color {
      background: #1a2e1a;
      color: #4ade80;
    }

    .binding-field {
      font-size: 12px;
      color: #e2e8f0;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .binding-arrow {
      color: #475569;
      font-size: 14px;
      flex-shrink: 0;
    }

    .binding-select {
      width: 110px;
      padding: 4px 6px;
      border: 1px solid #334155;
      border-radius: 5px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 11px;
      font-family: inherit;
      flex-shrink: 0;
    }

    .panel-empty {
      font-size: 12px;
      color: #475569;
      line-height: 1.6;
    }

    .panel-heading {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 10px;
    }

    /* ── Export bar ───────────────────────────────────────── */
    #export-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: #1e293b;
      border-top: 1px solid #334155;
      height: 52px;
      flex-shrink: 0;
    }

    .export-info {
      font-size: 12px;
      color: #94a3b8;
    }

    .export-info .num {
      font-weight: 700;
      color: #e2e8f0;
    }

    .progress-container {
      flex: 1;
      height: 6px;
      background: #0f172a;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #f59e0b;
      border-radius: 3px;
      width: 0%;
      transition: width 0.2s;
    }

    .progress-text {
      font-size: 11px;
      color: #64748b;
      min-width: 36px;
      text-align: right;
    }

    /* ── Modal ────────────────────────────────────────────── */
    .preview-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: #000000cc;
    }

    .modal-content {
      position: relative;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
    }

    .modal-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
    }

    .modal-close:hover { color: #e2e8f0; }

    .modal-body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    .modal-body svg {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      box-shadow: 0 4px 24px #00000066;
    }

    .modal-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-nav button {
      padding: 7px 16px;
      border: 1px solid #475569;
      border-radius: 6px;
      background: #0f172a;
      color: #cbd5e1;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .modal-nav button:hover { background: #334155; }
    .modal-nav button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Card entrance animation ─────────────────────────── */
    @keyframes card-entrance {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .preview-card {
      transition: border-color 0.15s, transform 0.2s ease-out;
      will-change: transform;
    }

    /* ── Palette panel ───────────────────────────────────── */
    .palette-swatches {
      display: flex;
      gap: 4px;
      padding: 8px 0 4px;
      flex-wrap: wrap;
    }

    .palette-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #334155;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }

    .palette-swatch:hover {
      transform: scale(1.2);
      border-color: #94a3b8;
    }

    .palette-color-input {
      width: 32px;
      height: 24px;
      border: 1px solid #334155;
      border-radius: 4px;
      background: #0f172a;
      cursor: pointer;
      padding: 0;
    }

    .palette-toggle {
      margin-right: 8px;
      accent-color: #f59e0b;
    }

    /* ── Modal animation controls ────────────────────────── */
    .modal-anim-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      margin-right: 12px;
    }

    .modal-anim-toggle {
      width: 28px;
      height: 28px;
      border: 1px solid #475569;
      border-radius: 6px;
      background: #0f172a;
      color: #cbd5e1;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .modal-anim-toggle:hover { background: #334155; }
    .modal-anim-toggle.playing {
      border-color: #f59e0b;
      color: #f59e0b;
    }

    .modal-anim-preset {
      width: 100px;
      font-size: 10px;
    }

    .modal-shader-toggle-label {
      font-size: 11px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .modal-shader-toggle {
      accent-color: #f59e0b;
    }

    /* ── 3D modal body tilt ──────────────────────────────── */
    .modal-body {
      transition: transform 0.15s ease-out;
      will-change: transform;
    }

    /* ── Hidden file inputs ──────────────────────────────── */
    .hidden-input { display: none; }

    /* ── Scrollbar styling ───────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body>
  <header>
    <h1><span>SVG OS</span> Studio</h1>
    <span class="wasm-badge" id="wasm-badge"><span class="dot"></span>Loading...</span>
    <div class="header-spacer"></div>
    <div class="header-status" id="header-status">Select a template to begin</div>
  </header>

  <main>
    <!-- Left: Template Gallery -->
    <div id="left-panel">
      <div class="panel-header">Templates</div>
      <div class="gallery-grid" id="gallery-container"></div>
    </div>

    <!-- Center: Preview Grid -->
    <div id="center-panel">
      <div id="preview-area">
        <div class="preview-empty" id="empty-state">
          <div class="preview-empty-icon">&#9634;</div>
          <div class="preview-empty-text">Pick a template, upload data</div>
          <div class="preview-empty-hint">Cards will appear here as you configure</div>
        </div>
      </div>
    </div>

    <!-- Right: Data + Mapping -->
    <div id="right-panel">
      <div class="panel-section">
        <div class="section-title">Data Source</div>
        <div class="btn-group">
          <button class="btn btn-sm" id="btn-upload-csv">Upload CSV</button>
          <button class="btn btn-sm" id="btn-upload-json">Upload JSON</button>
          <button class="btn btn-sm" id="btn-sample-data">Sample Data</button>
        </div>
        <div class="data-preview" id="data-preview" style="display:none"></div>
        <div class="data-columns" id="data-columns"></div>
      </div>
      <div class="panel-section" id="binding-container">
        <div class="section-title">Field Mapping</div>
        <p class="panel-empty" id="binding-empty">Select a template and upload data to map fields.</p>
      </div>
      <div class="panel-section" id="palette-container"></div>
    </div>
  </main>

  <!-- Export Bar -->
  <div id="export-bar">
    <div class="export-info" id="export-info">
      <span class="num" id="export-count">0</span> cards ready
    </div>
    <select class="binding-select" id="export-scale" title="Export resolution">
      <option value="1">1x</option>
      <option value="2" selected>2x</option>
      <option value="3">3x</option>
    </select>
    <select class="binding-select" id="export-bg" title="Background color">
      <option value="">Transparent</option>
      <option value="#ffffff">White</option>
      <option value="#0f172a">Dark</option>
    </select>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <span class="progress-text" id="progress-text"></span>
    <button class="btn btn-primary" id="btn-export" disabled>Export ZIP</button>
  </div>

  <!-- Hidden file inputs -->
  <input type="file" class="hidden-input" id="csv-input" accept=".csv">
  <input type="file" class="hidden-input" id="json-input" accept=".json">

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
