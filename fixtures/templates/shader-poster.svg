<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350" data-card-width="1080" data-card-height="1350">
  <defs>
    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Scan line pattern -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <!-- Crosshair grid -->
    <pattern id="grid-fine" width="108" height="108" patternUnits="userSpaceOnUse">
      <line x1="54" y1="0" x2="54" y2="108" stroke="#fff" stroke-opacity="0.03" stroke-width="0.5"/>
      <line x1="0" y1="54" x2="108" y2="54" stroke="#fff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Shader-generated background — href replaced at render time -->
  <image x="0" y="0" width="1080" height="1350"
         data-bind-attr-href="shader_bg"
         preserveAspectRatio="xMidYMid slice"
         href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="
         xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg=="/>

  <!-- Dark overlay for legibility -->
  <rect width="1080" height="1350" fill="#000" opacity="0.45"/>

  <!-- Vignette -->
  <rect width="1080" height="1350" fill="url(#vignette)"/>

  <!-- Scan lines -->
  <rect width="1080" height="1350" fill="url(#scanlines)"/>

  <!-- Fine grid overlay -->
  <rect width="1080" height="1350" fill="url(#grid-fine)"/>

  <!-- Corner frames — double line -->
  <polyline points="80,130 80,80 130,80" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="1"/>
  <polyline points="88,138 88,88 138,88" fill="none" stroke="#fff" stroke-opacity="0.1" stroke-width="0.5"/>
  <polyline points="950,80 1000,80 1000,130" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="1"/>
  <polyline points="942,88 992,88 992,138" fill="none" stroke="#fff" stroke-opacity="0.1" stroke-width="0.5"/>
  <polyline points="80,1220 80,1270 130,1270" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="1"/>
  <polyline points="88,1212 88,1262 138,1262" fill="none" stroke="#fff" stroke-opacity="0.1" stroke-width="0.5"/>
  <polyline points="950,1270 1000,1270 1000,1220" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="1"/>
  <polyline points="942,1262 992,1262 992,1212" fill="none" stroke="#fff" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Exhibition metadata strip -->
  <text x="80" y="160" font-family="'DM Mono', monospace" font-size="10" font-weight="400" fill="#fff" fill-opacity="0.25" letter-spacing="0.15em" data-bind="series">SERIES 001</text>
  <text x="540" y="160" text-anchor="middle" font-family="'DM Mono', monospace" font-size="10" font-weight="400" fill="#fff" fill-opacity="0.2" letter-spacing="0.15em" data-bind="edition">EDITION 1/1</text>
  <text x="1000" y="160" text-anchor="end" font-family="'DM Mono', monospace" font-size="10" font-weight="400" fill="#fff" fill-opacity="0.25" letter-spacing="0.15em" data-bind="artist">ARTIST: SVG OS</text>

  <!-- Center crosshair -->
  <line x1="530" y1="580" x2="550" y2="580" stroke="#fff" stroke-opacity="0.1" stroke-width="0.5"/>
  <line x1="540" y1="570" x2="540" y2="590" stroke="#fff" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Title shadow -->
  <text x="540" y="682" text-anchor="middle" font-family="'Syne', sans-serif" font-size="108" font-weight="800" fill="#000" fill-opacity="0.4" letter-spacing="-0.03em" data-bind="title">GENESIS</text>

  <!-- Title -->
  <text x="540" y="680" text-anchor="middle" font-family="'Syne', sans-serif" font-size="108" font-weight="800" fill="#fff" letter-spacing="-0.03em" data-bind="title">GENESIS</text>

  <!-- Subtitle -->
  <text x="540" y="740" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="22" font-weight="300" fill="#fff" fill-opacity="0.75" letter-spacing="0.08em" data-bind="subtitle">Algorithmic landscapes</text>

  <!-- Decorative divider with dots -->
  <line x1="400" y1="790" x2="520" y2="790" stroke="#fff" stroke-opacity="0.2" stroke-width="0.5"/>
  <circle cx="540" cy="790" r="2" fill="#fff" fill-opacity="0.3"/>
  <line x1="560" y1="790" x2="680" y2="790" stroke="#fff" stroke-opacity="0.2" stroke-width="0.5"/>

  <!-- Pattern type label -->
  <text x="540" y="830" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" font-weight="400" fill="#fff" fill-opacity="0.35" letter-spacing="0.2em" data-bind="pattern_label">PLASMA SHADER</text>

  <!-- Bottom data readout bar -->
  <rect x="80" y="1180" width="920" height="1" fill="#fff" opacity="0.06"/>

  <!-- Render info -->
  <text x="90" y="1215" font-family="'DM Mono', monospace" font-size="9" font-weight="400" fill="#fff" fill-opacity="0.2" letter-spacing="0.06em" data-bind="render_info">WGSL · 1080×1350 · GPU ACCELERATED</text>

  <!-- Branding -->
  <text x="540" y="1260" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="600" fill="#fff" fill-opacity="0.2" letter-spacing="0.2em">SVG OS · GENERATIVE ART</text>

  <!-- Frame counter -->
  <text x="990" y="1215" text-anchor="end" font-family="'DM Mono', monospace" font-size="9" font-weight="400" fill="#fff" fill-opacity="0.15" letter-spacing="0.06em">FRM 001/001</text>

  <!-- Decorative: floating measurement marks on edges -->
  <line x1="540" y1="40" x2="540" y2="55" stroke="#fff" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="540" y1="1295" x2="540" y2="1310" stroke="#fff" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="40" y1="675" x2="55" y2="675" stroke="#fff" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="1025" y1="675" x2="1040" y2="675" stroke="#fff" stroke-opacity="0.08" stroke-width="0.5"/>
</svg>
