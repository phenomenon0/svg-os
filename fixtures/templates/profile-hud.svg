<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" data-card-width="480" data-card-height="320">
  <defs>
    <filter id="avatar-ring-glow">
      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="holo-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.5 0.3" numOctaves="2" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <radialGradient id="avatar-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3" data-bind-stop="color_a"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dot-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.5" fill="#fff" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- 1. Dark background -->
  <rect width="480" height="320" fill="#0d0d14"/>

  <!-- 2. Holographic texture overlay -->
  <rect width="480" height="320" filter="url(#holo-texture)" opacity="0.03"/>

  <!-- 3. Dot grid -->
  <rect width="480" height="320" fill="url(#dot-grid)"/>

  <!-- 4. Card border -->
  <rect x="4" y="4" width="472" height="312" rx="8" fill="none" stroke="#fff" stroke-opacity="0.06"/>

  <!-- 5. Avatar area -->
  <circle cx="80" cy="110" r="42" fill="url(#avatar-glow)"/>
  <circle cx="80" cy="110" r="35" fill="#1a1a24" stroke="#8b5cf6" stroke-width="2.5" data-bind-attr-stroke="color_a" filter="url(#avatar-ring-glow)"/>
  <circle cx="105" cy="135" r="5" fill="#22c55e" data-bind-fill="status_color" stroke="#0d0d14" stroke-width="2"/>

  <!-- 6. Username -->
  <text x="135" y="95" font-family="Syne, sans-serif" font-weight="700" font-size="22px" fill="#fff" data-bind="username">SHADOWVEX</text>

  <!-- 7. Level badge -->
  <rect x="135" y="105" width="52" height="20" rx="10" fill="#8b5cf6" fill-opacity="0.2" data-bind-attr-fill="color_a"/>
  <text x="161" y="119" text-anchor="middle" font-family="DM Mono, monospace" font-size="9px" font-weight="500" fill="#8b5cf6" data-bind-fill="color_a" data-bind="level">LVL 247</text>

  <!-- 8. Status text -->
  <text x="195" y="119" font-family="DM Mono, monospace" font-size="9px" fill="#fff" opacity="0.4" data-bind="status">IN GAME</text>

  <!-- 9. XP progress bar -->
  <rect x="135" y="135" width="260" height="5" rx="2.5" fill="#fff" fill-opacity="0.06"/>
  <rect x="135" y="135" width="195" height="5" rx="2.5" fill="#8b5cf6" fill-opacity="0.5" data-bind-attr-fill="color_a" data-bind-attr-width="xp_width"/>
  <text x="135" y="158" font-family="DM Mono, monospace" font-size="8px" fill="#fff" opacity="0.35" data-bind="xp_text">18,450 / 25,000 XP</text>

  <!-- 10. Stat columns -->
  <!-- WINS -->
  <text x="80" y="210" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="28px" fill="#fff" data-bind="wins">1,247</text>
  <text x="80" y="232" text-anchor="middle" font-family="DM Mono, monospace" font-size="8px" fill="#fff" opacity="0.4" letter-spacing="0.1em">WINS</text>

  <!-- K/D -->
  <text x="200" y="210" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="28px" fill="#fff" data-bind="kd">2.34</text>
  <text x="200" y="232" text-anchor="middle" font-family="DM Mono, monospace" font-size="8px" fill="#fff" opacity="0.4" letter-spacing="0.1em">K/D</text>

  <!-- WIN% -->
  <text x="320" y="210" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="28px" fill="#fff" data-bind="winrate">67.2%</text>
  <text x="320" y="232" text-anchor="middle" font-family="DM Mono, monospace" font-size="8px" fill="#fff" opacity="0.4" letter-spacing="0.1em">WIN%</text>

  <!-- 11. Rank display -->
  <polygon points="420,85 435,100 420,115 405,100" fill="#8b5cf6" fill-opacity="0.3" data-bind-fill="rank_color"/>
  <polygon points="420,90 431,100 420,110 409,100" fill="#8b5cf6" fill-opacity="0.6" data-bind-fill="rank_color"/>
  <text x="420" y="140" text-anchor="middle" font-family="Syne, sans-serif" font-weight="700" font-size="14px" fill="#8b5cf6" data-bind-fill="rank_color" data-bind="rank">RADIANT</text>

  <!-- 12. Decorative HUD lines -->
  <line x1="30" y1="175" x2="450" y2="175" stroke="#fff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="30" y1="260" x2="450" y2="260" stroke="#fff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="135" y1="185" x2="395" y2="185" stroke="#fff" stroke-opacity="0.02" stroke-width="0.5"/>
  <line x1="30" y1="290" x2="200" y2="290" stroke="#fff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="300" y1="290" x2="450" y2="290" stroke="#fff" stroke-opacity="0.03" stroke-width="0.5"/>
</svg>
