<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" data-card-width="1200" data-card-height="630">
  <defs>
    <linearGradient id="port-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <clipPath id="screen-clip">
      <rect x="60" y="60" width="500" height="510" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#port-bg)"/>

  <!-- Screenshot area with photo -->
  <rect x="56" y="56" width="508" height="518" rx="18" fill="none" stroke="#ffffff10" stroke-width="1"/>
  <image href="data:image/jpeg;base64," x="60" y="60" width="500" height="510" clip-path="url(#screen-clip)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="60" y="60" width="500" height="510" rx="16" fill="#0a0a0a44"/>
  <text x="310" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#ffffff66">Project Screenshot</text>

  <!-- Right side content -->
  <!-- Category -->
  <rect x="620" y="70" width="120" height="26" rx="13" fill="#f59e0b15" stroke="#f59e0b30" stroke-width="1"/>
  <text x="680" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#f59e0b" letter-spacing="0.08em" data-bind="category">CASE STUDY</text>

  <!-- Project name -->
  <text x="620" y="148" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#f8fafc" data-bind="project_name">Project Name</text>

  <!-- Description -->
  <text x="620" y="185" font-family="Inter, sans-serif" font-size="15" fill="#94a3b8" data-bind="description">Brief project description goes here</text>

  <!-- Metrics row -->
  <g transform="translate(620, 230)">
    <rect x="0" y="0" width="150" height="70" rx="10" fill="#ffffff06" stroke="#ffffff08" stroke-width="1"/>
    <text x="75" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#f59e0b" data-bind="metric_1_value">10M+</text>
    <text x="75" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b" letter-spacing="0.08em" data-bind="metric_1_label">USERS</text>

    <rect x="165" y="0" width="150" height="70" rx="10" fill="#ffffff06" stroke="#ffffff08" stroke-width="1"/>
    <text x="240" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#22c55e" data-bind="metric_2_value">99.9%</text>
    <text x="240" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b" letter-spacing="0.08em" data-bind="metric_2_label">UPTIME</text>

    <rect x="330" y="0" width="150" height="70" rx="10" fill="#ffffff06" stroke="#ffffff08" stroke-width="1"/>
    <text x="405" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#8b5cf6" data-bind="metric_3_value">&lt;50ms</text>
    <text x="405" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b" letter-spacing="0.08em" data-bind="metric_3_label">P99 LATENCY</text>
  </g>

  <!-- Tech stack tags -->
  <g transform="translate(620, 340)">
    <rect x="0" y="0" width="60" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="30" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8" data-bind="tech_1">Rust</text>
    <rect x="68" y="0" width="75" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="105" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8" data-bind="tech_2">WASM</text>
    <rect x="151" y="0" width="95" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="198" y="16" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8" data-bind="tech_3">TypeScript</text>
  </g>

  <!-- Divider -->
  <line x1="620" y1="400" x2="1140" y2="400" stroke="#ffffff08" stroke-width="1"/>

  <!-- Author -->
  <text x="620" y="440" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0" data-bind="author">Author Name</text>
  <text x="620" y="462" font-family="Inter, sans-serif" font-size="12" fill="#64748b" data-bind="role">Role at Company</text>

  <!-- URL -->
  <text x="620" y="520" font-family="monospace" font-size="12" fill="#f59e0b" data-bind="url">project.example.com</text>

  <!-- Bottom accent -->
  <rect x="60" y="600" width="1080" height="3" rx="1.5" fill="#f59e0b" opacity="0.3"/>
</svg>