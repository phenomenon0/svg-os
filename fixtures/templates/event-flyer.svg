<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" data-card-width="1080" data-card-height="1350">
  <defs>
    <linearGradient id="flyer-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <pattern id="flyer-dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.5" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1080" height="1350" fill="url(#flyer-bg)"/>
  <rect width="1080" height="1350" fill="url(#flyer-dots)"/>

  <!-- Geometric abstract art — triangles and circles -->
  <polygon points="540,100 900,500 180,500" fill="none" stroke="#f59e0b" stroke-opacity="0.06" stroke-width="2"/>
  <polygon points="540,200 800,450 280,450" fill="none" stroke="#ec4899" stroke-opacity="0.05" stroke-width="1.5"/>
  <polygon points="540,300 700,400 380,400" fill="none" stroke="#8b5cf6" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="540" cy="350" r="120" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <circle cx="540" cy="350" r="80" fill="none" stroke="#f59e0b" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="540" cy="350" r="40" fill="#f59e0b" opacity="0.03"/>

  <!-- Floating particles -->
  <circle cx="200" cy="200" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="880" cy="300" r="1" fill="#ec4899" opacity="0.25"/>
  <circle cx="300" cy="1100" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="800" cy="1200" r="1" fill="#f59e0b" opacity="0.15"/>

  <!-- Corner frames -->
  <polyline points="60,80 60,50 90,50" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <polyline points="990,50 1020,50 1020,80" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <polyline points="60,1270 60,1300 90,1300" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <polyline points="990,1300 1020,1300 1020,1270" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Neon accent line -->
  <rect x="80" y="560" width="920" height="3" rx="1.5" fill="url(#neon)"/>

  <!-- Event name — Syne for impact -->
  <text x="540" y="680" text-anchor="middle" font-family="'Syne', sans-serif" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-0.02em" data-bind="event_name">EVENT NAME</text>

  <!-- Tagline — Outfit for airy elegance -->
  <text x="540" y="730" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="20" font-weight="300" fill="#94a3b8" data-bind="tagline">The experience you can't miss</text>

  <!-- Date block -->
  <rect x="340" y="790" width="400" height="80" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="540" y="825" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="700" fill="#f59e0b" data-bind="date">MAR 21, 2026</text>
  <text x="540" y="855" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" fill="#64748b" letter-spacing="0.1em" data-bind="time">DOORS 8PM · SHOW 9PM</text>

  <!-- Venue — Plus Jakarta Sans -->
  <text x="540" y="940" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" font-weight="600" fill="#e2e8f0" data-bind="venue">The Grand Hall</text>
  <text x="540" y="968" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="14" font-weight="300" fill="#64748b" data-bind="address">123 Main Street, City</text>

  <!-- Lineup -->
  <text x="540" y="1040" text-anchor="middle" font-family="'DM Mono', monospace" font-size="10" fill="#64748b" letter-spacing="0.2em">FEATURING</text>
  <text x="540" y="1080" text-anchor="middle" font-family="'Syne', sans-serif" font-size="28" font-weight="700" fill="#e2e8f0" data-bind="headliner">Headliner Name</text>
  <text x="540" y="1115" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="16" font-weight="400" fill="#94a3b8" data-bind="supporting">Supporting Act · Special Guest</text>

  <!-- Ticket CTA -->
  <rect x="380" y="1180" width="320" height="56" rx="28" fill="url(#neon)"/>
  <text x="540" y="1215" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="#0a0a0a" letter-spacing="0.06em" data-bind="cta">GET TICKETS</text>

  <!-- Bottom decorative -->
  <rect x="80" y="1290" width="920" height="1" rx="0.5" fill="#ffffff" opacity="0.04"/>
  <text x="540" y="1325" text-anchor="middle" font-family="'DM Mono', monospace" font-size="9" fill="#334155" letter-spacing="0.12em" data-bind="promo_code">USE CODE: EARLYBIRD</text>
</svg>
