<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560" data-card-width="400" data-card-height="560">
  <defs>
    <filter id="rating-glow">
      <feGaussianBlur stdDeviation="6" in="SourceGraphic" result="blur"/>
      <feFlood flood-color="white" flood-opacity="0.3" result="glow"/>
      <feComposite in="glow" in2="blur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="blur"/>
      <feFlood flood-color="white" flood-opacity="0.4" result="glow"/>
      <feComposite in="glow" in2="blur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#d4a843" data-bind-stop="color_a"/>
      <stop offset="50%" stop-color="#c49b38" data-bind-stop="color_b"/>
      <stop offset="100%" stop-color="#a07d2a" data-bind-stop="color_c"/>
    </linearGradient>

    <radialGradient id="metallic-sheen" cx="25%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="hex-clip">
      <polygon points="200,120 269,160 269,240 200,280 131,240 131,160"/>
    </clipPath>
  </defs>

  <!-- 1. Background -->
  <rect width="400" height="560" fill="url(#bg-grad)"/>

  <!-- 2. Metallic sheen -->
  <rect width="400" height="560" fill="url(#metallic-sheen)"/>

  <!-- 3. Decorative border -->
  <rect x="12" y="12" width="376" height="536" rx="4" fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- 4. Overall rating -->
  <text x="70" y="160" font-family="'Syne', sans-serif" font-size="96" font-weight="800" fill="#ffffff" filter="url(#rating-glow)" data-bind="overall">94</text>

  <!-- 5. Position badge -->
  <rect x="50" y="170" width="55" height="22" rx="11" fill="#000" fill-opacity="0.2"/>
  <text x="77" y="186" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" font-weight="500" fill="#fff" data-bind="position">ST</text>

  <!-- 6. Photo area (hex-clipped) -->
  <rect x="130" y="100" width="160" height="180" fill="#fff" fill-opacity="0.08" clip-path="url(#hex-clip)"/>
  <polygon points="200,120 269,160 269,240 200,280 131,240 131,160" fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- 7. Player name -->
  <text x="200" y="320" text-anchor="middle" font-family="'Syne', sans-serif" font-size="24" font-weight="700" fill="#ffffff" data-bind="name">MARCUS VALENCIA</text>

  <!-- 8. Nationality -->
  <text x="200" y="342" text-anchor="middle" font-family="'DM Mono', monospace" font-size="10" fill="#fff" fill-opacity="0.6" letter-spacing="0.1em" data-bind="nationality">SPAIN</text>

  <!-- 9. Tier label -->
  <text x="200" y="365" text-anchor="middle" font-family="'DM Mono', monospace" font-size="9" fill="#fff" fill-opacity="0.5" letter-spacing="0.2em" data-bind="tier">ICON</text>

  <!-- 10. Decorative divider -->
  <line x1="80" y1="380" x2="320" y2="380" stroke="#fff" stroke-opacity="0.2" stroke-width="0.5"/>

  <!-- 11. Stats grid — Row 1 -->
  <text x="100" y="405" text-anchor="middle" font-family="'DM Mono', monospace" font-size="8" fill="#fff" fill-opacity="0.5" letter-spacing="0.15em">PAC</text>
  <text x="100" y="428" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#fff" data-bind="pac">96</text>

  <text x="200" y="405" text-anchor="middle" font-family="'DM Mono', monospace" font-size="8" fill="#fff" fill-opacity="0.5" letter-spacing="0.15em">SHO</text>
  <text x="200" y="428" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#fff" data-bind="sho">93</text>

  <text x="300" y="405" text-anchor="middle" font-family="'DM Mono', monospace" font-size="8" fill="#fff" fill-opacity="0.5" letter-spacing="0.15em">PAS</text>
  <text x="300" y="428" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#fff" data-bind="pas">78</text>

  <!-- 11. Stats grid — Row 2 -->
  <text x="100" y="455" text-anchor="middle" font-family="'DM Mono', monospace" font-size="8" fill="#fff" fill-opacity="0.5" letter-spacing="0.15em">DRI</text>
  <text x="100" y="478" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#fff" data-bind="dri">90</text>

  <text x="200" y="455" text-anchor="middle" font-family="'DM Mono', monospace" font-size="8" fill="#fff" fill-opacity="0.5" letter-spacing="0.15em">DEF</text>
  <text x="200" y="478" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#fff" data-bind="def_stat">42</text>

  <text x="300" y="455" text-anchor="middle" font-family="'DM Mono', monospace" font-size="8" fill="#fff" fill-opacity="0.5" letter-spacing="0.15em">PHY</text>
  <text x="300" y="478" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#fff" data-bind="phy">84</text>

  <!-- 12. Rarity glow border -->
  <rect x="6" y="6" width="388" height="548" rx="8" fill="none" stroke="#d4a843" stroke-width="2" data-bind-attr-stroke="color_a" filter="url(#neon-glow)"/>
</svg>
