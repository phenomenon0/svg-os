<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560" data-card-width="400" data-card-height="560">
  <defs>
    <!-- Neon glow filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feFlood flood-color="white" flood-opacity="0.6" result="flood"/>
      <feComposite in="flood" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Smoke overlay filter -->
    <filter id="smoke-overlay" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="2"/>
    </filter>

    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" data-bind-stop="color_a"/>
      <stop offset="100%" stop-color="#1e1b4b" data-bind-stop="color_b"/>
    </linearGradient>

    <!-- Glow overlay -->
    <radialGradient id="glow-overlay" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3" data-bind-stop="color_a"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- Dot grid pattern -->
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#fff" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- 1. Background -->
  <rect width="400" height="560" fill="url(#bg-grad)"/>

  <!-- 2. Glow overlay -->
  <rect width="400" height="560" fill="url(#glow-overlay)"/>

  <!-- 3. Dot grid -->
  <rect width="400" height="560" fill="url(#dot-grid)"/>

  <!-- 4. Character photo placeholder -->
  <rect x="50" y="50" width="300" height="180" rx="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- 5. Element icon (diamond / rotated square) -->
  <rect x="185" y="248" width="20" height="20" rx="2" transform="rotate(45 195 258)" fill="#7c3aed" data-bind-fill="color_a"/>

  <!-- 6. Name -->
  <text x="200" y="300" text-anchor="middle" font-family="'Syne', sans-serif" font-size="26" font-weight="800" fill="#ffffff" data-bind="name">KAEL STORMBRINGER</text>

  <!-- 7. Title -->
  <text x="200" y="322" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="13" font-weight="300" fill="#7c3aed" data-bind-fill="color_a" data-bind="title">Wind Elemental</text>

  <!-- 8. Element label -->
  <text x="200" y="342" text-anchor="middle" font-family="'DM Mono', monospace" font-size="9" fill="#fff" fill-opacity="0.4" letter-spacing="0.15em" data-bind="element">WIND</text>

  <!-- 9. Stars -->
  <text x="200" y="370" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#f59e0b" data-bind="stars">★★★★★</text>

  <!-- 10. Stat bars -->

  <!-- ATK -->
  <text x="50" y="400" font-family="'DM Mono', monospace" font-size="9" font-weight="500" fill="#fff" fill-opacity="0.5">ATK</text>
  <rect x="100" y="395" width="240" height="6" rx="3" fill="#fff" fill-opacity="0.06"/>
  <rect x="100" y="395" width="200" height="6" rx="3" fill="#fff" fill-opacity="0.3" data-bind-attr-width="atk_width"/>
  <text x="348" y="400" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="0.7" data-bind="atk">85</text>

  <!-- DEF -->
  <text x="50" y="423" font-family="'DM Mono', monospace" font-size="9" font-weight="500" fill="#fff" fill-opacity="0.5">DEF</text>
  <rect x="100" y="418" width="240" height="6" rx="3" fill="#fff" fill-opacity="0.06"/>
  <rect x="100" y="418" width="160" height="6" rx="3" fill="#fff" fill-opacity="0.3" data-bind-attr-width="def_width"/>
  <text x="348" y="423" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="0.7" data-bind="def">67</text>

  <!-- SPD -->
  <text x="50" y="446" font-family="'DM Mono', monospace" font-size="9" font-weight="500" fill="#fff" fill-opacity="0.5">SPD</text>
  <rect x="100" y="441" width="240" height="6" rx="3" fill="#fff" fill-opacity="0.06"/>
  <rect x="100" y="441" width="220" height="6" rx="3" fill="#fff" fill-opacity="0.3" data-bind-attr-width="spd_width"/>
  <text x="348" y="446" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="0.7" data-bind="spd">92</text>

  <!-- HP -->
  <text x="50" y="469" font-family="'DM Mono', monospace" font-size="9" font-weight="500" fill="#fff" fill-opacity="0.5">HP</text>
  <rect x="100" y="464" width="240" height="6" rx="3" fill="#fff" fill-opacity="0.06"/>
  <rect x="100" y="464" width="180" height="6" rx="3" fill="#fff" fill-opacity="0.3" data-bind-attr-width="hp_width"/>
  <text x="348" y="469" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="600" fill="#fff" fill-opacity="0.7" data-bind="hp">75</text>

  <!-- 11. Smoke overlay -->
  <rect x="0" y="440" width="400" height="120" fill="#000" fill-opacity="0.3" filter="url(#smoke-overlay)"/>

  <!-- 12. Neon glow border -->
  <rect x="8" y="8" width="384" height="544" rx="12" fill="none" stroke="#7c3aed" stroke-width="2" data-bind-attr-stroke="color_a" filter="url(#neon-glow)"/>
</svg>
